name: Odoo CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: odoo
          POSTGRES_PASSWORD: odoo
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U odoo"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      # 1. Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Python (IMPORTANT)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 3. Install system dependencies
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git build-essential \
            python3-dev \
            libxml2-dev libxslt1-dev \
            libldap2-dev libsasl2-dev \
            libssl-dev libpq-dev \
            zlib1g-dev \
            libev-dev \
            libffi-dev

      # 4. Upgrade build tools (FIX POSITION)
      - name: Upgrade build tools
        run: |
          python -m pip install --upgrade pip wheel setuptools "Cython<3"

      # 5. Install base Python packages
      - name: Install base Python packages
        run: |
          pip install psycopg2-binary

      # 6. Clone Odoo
      - name: Clone Odoo
        run: |
          git clone --depth 1 https://github.com/odoo/odoo.git odoo

      # 7. Pre-fix gevent (IMPORTANT FIX)
      - name: Fix gevent compatibility
        run: |
          pip install "gevent>=22.10.2" "greenlet>=2.0.0"

      # 8. Install Odoo requirements
      - name: Install Odoo requirements
        run: |
          pip install -r odoo/requirements.txt

      # 9. Create Odoo config file
      - name: Create Odoo config
        run: |
          echo "[options]
          addons_path = odoo/addons,.
          admin_passwd = admin
          db_host = localhost
          db_port = 5432
          db_user = odoo
          db_password = odoo
          db_name = False
          logfile = None" > odoo.conf

      # 10. Run Odoo Tests
      - name: Run Odoo Tests
        run: |
          cd odoo
          python odoo-bin -c ../odoo.conf \
            -d test_db \
            -i credit_limit_control \
            --stop-after-init \
            --test-enable
