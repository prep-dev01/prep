name: Odoo CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: odoo
          POSTGRES_PASSWORD: odoo
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U odoo"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git build-essential \
            python3-dev \
            libxml2-dev libxslt1-dev \
            libldap2-dev libsasl2-dev \
            libssl-dev libpq-dev \
            zlib1g-dev \
            libev-dev \
            libffi-dev

      - name: Upgrade pip tools
        run: |
          python -m pip install --upgrade pip wheel setuptools

      - name: Install base dependencies
        run: |
          pip install psycopg2-binary

      - name: Clone Odoo
        run: |
          git clone --depth 1 --branch 19.0 https://github.com/odoo/odoo.git odoo

      - name: Install Odoo requirements
        run: |
          pip install --prefer-binary -r odoo/requirements.txt

      - name: Create Odoo config
        run: |
          cat <<EOF > odoo.conf
          [options]
          addons_path = odoo/addons,.
          admin_passwd = admin
          db_host = localhost
          db_port = 5432
          db_user = odoo
          db_password = odoo
          db_name = False
          logfile = None
          EOF

      - name: Run credit_limit_control checks
        run: |
          python odoo/odoo-bin -c odoo.conf \
            -d test_db \
            -i credit_limit_control \
            --stop-after-init \
            --test-enable \
            --test-tags /credit_limit_control

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      ODOO_HOST: ${{ secrets.ODOO_HOST }}
      ODOO_USER: ${{ secrets.ODOO_USER }}
      ODOO_PORT: ${{ secrets.ODOO_PORT || '22' }}
      ODOO_SSH_KEY: ${{ secrets.ODOO_SSH_KEY }}
      ODOO_ADDONS_PATH: ${{ secrets.ODOO_ADDONS_PATH }}
      ODOO_SERVICE: ${{ secrets.ODOO_SERVICE }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Validate deployment secrets
        run: |
          : "${ODOO_HOST:?Missing GitHub Secret ODOO_HOST}"
          : "${ODOO_USER:?Missing GitHub Secret ODOO_USER}"
          : "${ODOO_SSH_KEY:?Missing GitHub Secret ODOO_SSH_KEY}"
          : "${ODOO_ADDONS_PATH:?Missing GitHub Secret ODOO_ADDONS_PATH}"
          : "${ODOO_SERVICE:?Missing GitHub Secret ODOO_SERVICE}"

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$ODOO_SSH_KEY" > ~/.ssh/odoo_deploy_key
          chmod 600 ~/.ssh/odoo_deploy_key
          ssh-keyscan -p "$ODOO_PORT" "$ODOO_HOST" >> ~/.ssh/known_hosts

      - name: Deploy module to Odoo server
        run: |
          rsync -az --delete \
            --exclude '__pycache__/' \
            --exclude '*.pyc' \
            -e "ssh -i ~/.ssh/odoo_deploy_key -p $ODOO_PORT" \
            credit_limit_control/ \
            "$ODOO_USER@$ODOO_HOST:$ODOO_ADDONS_PATH/credit_limit_control/"

      - name: Restart Odoo service
        run: |
          ssh -i ~/.ssh/odoo_deploy_key -p "$ODOO_PORT" "$ODOO_USER@$ODOO_HOST" \
            "sudo systemctl restart $ODOO_SERVICE"
