name: Odoo CI/CD Pipeline

on:
  push:
    branches: [develop, staging, main]
  pull_request:
    branches: [develop, staging, main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: odoo
          POSTGRES_PASSWORD: odoo
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U odoo"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git build-essential \
            python3-dev \
            libxml2-dev libxslt1-dev \
            libldap2-dev libsasl2-dev \
            libssl-dev libpq-dev \
            zlib1g-dev \
            libev-dev \
            libffi-dev

      - name: Upgrade pip tools
        run: |
          python -m pip install --upgrade pip wheel setuptools

      - name: Install base dependencies
        run: |
          pip install psycopg2-binary

      - name: Clone Odoo
        run: |
          git clone --depth 1 --branch 19.0 https://github.com/odoo/odoo.git odoo

      - name: Install Odoo requirements
        run: |
          pip install --prefer-binary -r odoo/requirements.txt

      - name: Create Odoo config
        run: |
          cat <<EOF > odoo.conf
          [options]
          addons_path = odoo/addons,.
          admin_passwd = admin
          db_host = localhost
          db_port = 5432
          db_user = odoo
          db_password = odoo
          db_name = False
          logfile = None
          EOF

      - name: Run credit_limit_control checks
        run: |
          python odoo/odoo-bin -c odoo.conf \
            -d test_db \
            -i credit_limit_control \
            --stop-after-init \
            --test-enable \
            --test-tags /credit_limit_control

  deploy:
    runs-on: self-hosted
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy module locally
        run: |
          rsync -az --delete \
            --exclude '__pycache__/' \
            --exclude '*.pyc' \
            credit_limit_control/ \
            /home/pranjal/odoo/odoo-19-modules/credit_limit_control/

      - name: Upgrade module in CI/CD test database
        run: |
          cd /home/pranjal/odoo/odoo-19
          ./venv/bin/python odoo-bin -c config/odoo.conf \
            -d ci_cd_test \
            -i credit_limit_control \
            -u credit_limit_control \
            --stop-after-init \
            --without-demo=all

      - name: Restart Odoo service
        run: |
          sudo /usr/bin/systemctl restart odoo19
